<?xml version="1.0" encoding="UTF-8"?>
<!--
  Баннер «Пробный урок» — 1280×640.
  ТЗ §6.2: линейный градиент #0A91C4 → #0076B8 (135°),
  заголовок «Прокачай себя!» белый, подзаголовок «Первый урок — бесплатно»,
  марка DF на чёрном квадрате для контраста, нижняя полоса чёрная.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#0A91C4"/>
      <stop offset="100%" stop-color="#0076B8"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- DF-марка справа сверху — на чёрном для контраста -->
  <g transform="translate(1160 32)">
    <rect width="88" height="88" rx="14" fill="#000000"/>
    <text x="44" y="60"
          text-anchor="middle"
          font-family="Onest, system-ui, sans-serif"
          font-weight="900"
          font-size="42"
          fill="#FFFFFF">DF</text>
  </g>

  <!-- заголовок -->
  <text x="64" y="320"
        font-family="Onest, system-ui, sans-serif"
        font-weight="900"
        font-size="132"
        letter-spacing="-4"
        fill="#FFFFFF">Прокачай</text>
  <text x="64" y="450"
        font-family="Onest, system-ui, sans-serif"
        font-weight="900"
        font-size="132"
        letter-spacing="-4"
        fill="#FFFFFF">себя!</text>

  <!-- подзаголовок -->
  <text x="64" y="510"
        font-family="Onest, system-ui, sans-serif"
        font-weight="500"
        font-size="32"
        fill="#FFFFFF">Первый урок — бесплатно</text>

  <!-- нижняя полоса -->
  <rect x="0" y="628" width="1280" height="12" fill="#000000"/>
</svg>
