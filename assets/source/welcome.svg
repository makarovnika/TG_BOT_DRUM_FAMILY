<?xml version="1.0" encoding="UTF-8"?>
<!--
  Баннер /start — 1280×640.
  ТЗ §6.1: чёрный фон + радиальная #0A91C4 35% в правом нижнем углу,
  заголовок «Стань частью барабанной семьи» (слово «барабанной» — #12B1EB),
  подзаголовок «Drum Family · Томск», нижняя полоса #0A91C4.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <!-- фон -->
  <defs>
    <radialGradient id="hl" cx="0.85" cy="0.85" r="0.65">
      <stop offset="0%"  stop-color="#0A91C4" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#0A91C4" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1280" height="640" fill="#000000"/>
  <rect width="1280" height="640" fill="url(#hl)"/>

  <!-- DF-марка в правом верхнем углу 88×88, отступ 32 -->
  <g transform="translate(1160 32)">
    <rect width="88" height="88" rx="14" fill="#0A91C4"/>
    <text x="44" y="60"
          text-anchor="middle"
          font-family="Onest, system-ui, sans-serif"
          font-weight="900"
          font-size="42"
          fill="#FFFFFF">DF</text>
  </g>

  <!-- заголовок -->
  <text x="64" y="280"
        font-family="Onest, system-ui, sans-serif"
        font-weight="900"
        font-size="100"
        letter-spacing="-3"
        fill="#FFFFFF">Стань частью</text>
  <text x="64" y="400"
        font-family="Onest, system-ui, sans-serif"
        font-weight="900"
        font-size="100"
        letter-spacing="-3">
    <tspan fill="#12B1EB">барабанной</tspan>
  </text>
  <text x="64" y="510"
        font-family="Onest, system-ui, sans-serif"
        font-weight="900"
        font-size="100"
        letter-spacing="-3"
        fill="#FFFFFF">семьи</text>

  <!-- подзаголовок -->
  <text x="64" y="558"
        font-family="Onest, system-ui, sans-serif"
        font-weight="400"
        font-size="28"
        fill="#FFFFFF"
        opacity="0.7">Drum Family · Томск</text>

  <!-- нижняя полоса -->
  <rect x="0" y="628" width="1280" height="12" fill="#0A91C4"/>
</svg>
