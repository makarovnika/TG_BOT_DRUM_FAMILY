<?xml version="1.0" encoding="UTF-8"?>
<!--
  Баннер «Адрес/Контакты» — 1280×640.
  ТЗ §6.3: фон #0E0E10 + радиальная #EB3800 30% в левом нижнем,
  заголовок «200 м² драйва» (слово «драйва» — #12B1EB),
  подзаголовок «пр. Комсомольский, 68/5 · Томск», нижняя полоса #EB3800.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <radialGradient id="hl" cx="0.15" cy="0.85" r="0.7">
      <stop offset="0%"  stop-color="#EB3800" stop-opacity="0.45"/>
      <stop offset="55%" stop-color="#EB3800" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0E0E10" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1280" height="640" fill="#0E0E10"/>
  <rect width="1280" height="640" fill="url(#hl)"/>

  <!-- DF-марка -->
  <g transform="translate(1160 32)">
    <rect width="88" height="88" rx="14" fill="#0A91C4"/>
    <text x="44" y="60"
          text-anchor="middle"
          font-family="Onest, system-ui, sans-serif"
          font-weight="900"
          font-size="42"
          fill="#FFFFFF">DF</text>
  </g>

  <!-- заголовок -->
  <text x="64" y="300"
        font-family="Onest, system-ui, sans-serif"
        font-weight="900"
        font-size="132"
        letter-spacing="-4"
        fill="#FFFFFF">200 м²</text>
  <text x="64" y="430"
        font-family="Onest, system-ui, sans-serif"
        font-weight="900"
        font-size="132"
        letter-spacing="-4">
    <tspan fill="#12B1EB">драйва</tspan>
  </text>

  <!-- подзаголовок -->
  <text x="64" y="500"
        font-family="Onest, system-ui, sans-serif"
        font-weight="500"
        font-size="32"
        fill="#FFFFFF">пр. Комсомольский, 68/5 · Томск</text>

  <!-- нижняя полоса -->
  <rect x="0" y="628" width="1280" height="12" fill="#EB3800"/>
</svg>
